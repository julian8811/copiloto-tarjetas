name: Deploy Vercel

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      - name: Check Vercel token
        id: check
        run: |
          if [ -z "${{ secrets.VERCEL_TOKEN }}" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "VERCEL_TOKEN no configurado. Agrega el secret en GitHub → Settings → Secrets."
            exit 0
          fi
          echo "configured=true" >> "$GITHUB_OUTPUT"

      - name: Link and configure project
        if: steps.check.outputs.configured == 'true'
        run: |
          vercel link --yes --token="${{ secrets.VERCEL_TOKEN }}" \
            ${{ secrets.VERCEL_SCOPE && format('--scope {0}', secrets.VERCEL_SCOPE) || '' }} \
            ${{ secrets.VERCEL_PROJECT_ID && format('--project {0}', secrets.VERCEL_PROJECT_ID) || '' }}

      - name: Configure GROQ_API_KEY on Vercel
        if: steps.check.outputs.configured == 'true' && secrets.GROQ_API_KEY != ''
        run: |
          vercel env rm GROQ_API_KEY production --token="${{ secrets.VERCEL_TOKEN }}" --yes 2>/dev/null || true
          printf '%s' "${{ secrets.GROQ_API_KEY }}" | vercel env add GROQ_API_KEY production --token="${{ secrets.VERCEL_TOKEN }}"
          vercel env rm GROQ_API_KEY preview --token="${{ secrets.VERCEL_TOKEN }}" --yes 2>/dev/null || true
          printf '%s' "${{ secrets.GROQ_API_KEY }}" | vercel env add GROQ_API_KEY preview --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Build
        if: steps.check.outputs.configured == 'true'
        run: npm run build
        env:
          VITE_BASE_PATH: /

      - name: Deploy to Vercel Production
        if: steps.check.outputs.configured == 'true'
        run: vercel deploy --prebuilt --prod --token="${{ secrets.VERCEL_TOKEN }}"
