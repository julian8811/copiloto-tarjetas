name: Deploy Vercel

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      - name: Pull Vercel environment
        if: ${{ secrets.VERCEL_TOKEN != '' }}
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Configure GROQ_API_KEY on Vercel
        if: ${{ secrets.VERCEL_TOKEN != '' && secrets.GROQ_API_KEY != '' }}
        run: |
          vercel env rm GROQ_API_KEY production --token=${{ secrets.VERCEL_TOKEN }} --yes 2>/dev/null || true
          printf '%s' "${{ secrets.GROQ_API_KEY }}" | vercel env add GROQ_API_KEY production --token=${{ secrets.VERCEL_TOKEN }}
          vercel env rm GROQ_API_KEY preview --token=${{ secrets.VERCEL_TOKEN }} --yes 2>/dev/null || true
          printf '%s' "${{ secrets.GROQ_API_KEY }}" | vercel env add GROQ_API_KEY preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build
        run: npm run build
        env:
          VITE_BASE_PATH: /

      - name: Deploy to Vercel Production
        if: ${{ secrets.VERCEL_TOKEN != '' }}
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
